auto_hydro_events:
  -
    hydro_event_type: HYDRO_MONITOR_RULE
    hydro_event_id: template-AutoMonitorRuleEvent-001
    hydro_event_name: 自动预警规则下发事件
    hydro_event_description: 自动预警规则下发事件
    consumption_mode: DIRECT_AGENT
    auto_schedule_at_step: 1
    auto_hydro_event_enable: true
    priority: MEDIUM
    monitor_rules:
      -
        rule_id: MRULE_202601142210_5WZBL1BQ
        rule_name: 流量过低
        biz_status: NORMAL
        trigger_conditions:
          object_id: 20801
          object_name: CH568-1
          trigger_expression: water_flow < 20
          alert_level: RISK_HIGH
          alert_message: 【CH568-1】流量过低预警，当前流量小于20
      -
        rule_id: MRULE_202603302210_5WZBL1QD
        rule_name: 水位超限
        biz_status: NORMAL
        trigger_conditions:
          object_id: 21801
          object_name: CH576-1
          alert_level: RISK_HIGH
          trigger_expression: water_level >= 74.14
          alert_message: 【CH576-1】流量过低预警，当前水位大于于74.14
  -
    hydro_event_type: WEATHER_FORECAST
    hydro_event_id: template-WeatherForecastHydroEvent-001
    hydro_event_name: 天气预报事件
    auto_schedule_at_step: 10
    hydro_event_description: 系统预制的暴雨事件
    time_series_url: https://hydroos.cn/s3/hydros-mdm/waternetworks/京石段-全_100/events/time_series_weather_forecast.json
    direct_load_time_series: true
    auto_hydro_event_enable: true
    priority: MEDIUM
  -
    hydro_event_type: WATER_USE
    hydro_event_id: template-WaterUserHydroEvent-001
    hydro_event_name: 紧急用水事件
    auto_schedule_at_step: 0
    hydro_event_description: 系统预制的紧急用水事件
    time_series_url: https://hydroos.cn/s3/hydros-mdm/waternetworks/京石段-全_100/events/time_series_water_use_industrial.json
    direct_load_time_series: true
    auto_hydro_event_enable: true
    priority: MEDIUM
  -
    hydro_event_type: DEVICE_STATUS_CHANGE
    hydro_event_id: TS_DEFAULT_DEVICE_STATUS_CHAGNE_001
    hydro_event_name: 设备例行检修
    auto_schedule_at_step: 0
    hydro_event_description: 设备例行检修
    time_series_url: https://hydroos.cn/s3/hydros-mdm/waternetworks/京石段-全_100/events/time_series_device_status_change.json
    direct_load_time_series: true
    auto_hydro_event_enable: true
    priority: MEDIUM
auto_schedule_event_enabled: false
