biz_scenario:
  biz_scenario_id: 100008
  biz_scenario_name: 京石段-数字孪生智能体
waterway:
  waterway_id: 50
  waterway_name: 京石段
hydro_environment_type: NORMAL
agents:
  - agent_code: TWINS_SIMULATION_AGENT_demo001
    agent_type: TWINS_SIMULATION_AGENT
    agent_name: IDZ数字孪生智能体
    agent_configuration_url: http://47.97.1.45:9000/hydros/mdm/京石段/agents/idz_test/agent_config.yaml
auto_hydro_events:
  - hydro_event_type: HYDRO_MONITOR_RULE
    hydro_event_id: template-AutoMonitorRuleEvent-001
    hydro_event_name: 自动预警规则下发事件
    hydro_event_source_type: HYDRO_MONITOR_RULE
    hydro_event_description: 自动预警规则下发事件
    consumption_mode: RULE_ENGINE
    auto_schedule_at_step: 1
    auto_hydro_event_enable: true
    priority: MEDIUM
    monitor_rules:
      - rule_id: MRULE_202601142210_5WZBL1AB
        rule_name: 水位预警监控
        biz_status: NORMAL
        trigger_conditions:
          object_id: 1039
          object_name: ZM1-入口断面
          trigger_expression: water_level > 60
          alert_message: 【ZM1-入口断面】水位过高预警，当前水位大于60
      - rule_id: MRULE_202603302210_5WZBL1AD
        rule_name: 水位预警监控
        biz_status: NORMAL
        trigger_conditions:
          object_id: 1040
          object_name: QD-5#断面#001
          trigger_expression: water_level <= 63
          alert_message: 【QD-5#断面#001】水位过低预警，当前水位小于63
  - hydro_event_type: WEATHER_FORECAST
    hydro_event_id: template-WeatherForecastHydroEvent-001
    hydro_event_name: 天气预报事件
    auto_schedule_at_step: 10
    hydro_event_source_type: WEATHER_FOR_CAST
    hydro_event_description: 系统预制的暴雨事件
    time_series_url: http://47.97.1.45:9000/hydros/mdm/京石段/events/time_series_weather_forecast.json
    direct_load_time_series: true
    auto_hydro_event_enable: true
    priority: HIGH

  - hydro_event_type: TIME_SERIES_DATA_UPDATED
    hydro_event_id: TS_REQ_1001_202601141607
    hydro_event_name: 用水计划事件
    auto_schedule_at_step: 10
    hydro_event_source_type: WATER_USE
    hydro_event_description: 系统预制的用水计划
    time_series_url: http://47.97.1.45:9000/hydros/mdm/京石段/events/time_series_water_use_residential.json
    direct_load_time_series: true
    auto_hydro_event_enable: true
    priority: MEDIUM

  - hydro_event_type: TIME_SERIES_DATA_UPDATED
    hydro_event_id: TS_DEFAULT_DEVICE_FAULT_001
    hydro_event_name: 应急检修事件
    auto_schedule_at_step: 10
    hydro_event_source_type: DEVICE_FAULT
    hydro_event_description: 模拟设备故障
    time_series_url: http://47.97.1.45:9000/hydros/mdm/京石段/events/time_series_device_fault.json
    priority: HIGH
    valid: true
    auto_hydro_event_enable: true
    hydro_environment_type: NORMAL

auto_schedule_event_enabled: true
hydros_objects_modeling_url: 'http://47.97.1.45:9000/hydros/mdm/京石段/hydro_modeling/objects.yaml'
biz_scene_configuration_url: 'http://47.97.1.45:9000/hydros/mdm/scenarios/100008.yaml'
sim_agent_properties:
  total_steps: 100
  sim_step_size: 60
  output_step_size: 3600
  biz_start_time: 2025/01/01 00:00:00
  roll_steps: 10
  output_future_steps: 20
default_rendering_objects:
  - object_id: 1041
    object_type: Gate
    object_name: 'ZM1-节制闸#1'
  - object_id: 1053
    object_type: Gate
    object_name: 'ZM2-节制闸#2'
  - object_id: 1040
    object_type: CrossSection
    object_name: 'QD-5#断面#001'
  - object_id: 1052
    object_type: Gate
    object_name: 'ZM2-节制闸#1'
