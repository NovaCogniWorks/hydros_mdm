auto_hydro_events:
  - hydro_event_type: HYDRO_MONITOR_RULE
    hydro_event_id: template-AutoMonitorRuleEvent-001
    hydro_event_name: 自动预警规则下发事件
    hydro_event_source_type: HYDRO_MONITOR_RULE
    hydro_event_description: 自动预警规则下发事件
    auto_schedule_at_step: 1
    auto_hydro_event_enable: true
    monitoring_rule:
      rule_id: MRULE_202601142210_5WZBL1BQ
      rule_name: 自动下发的水位监控规则
      biz_status: NORMAL
      trigger_conditions:
        object_id: 1031
        object_name: QD-1#断面#001
        trigger_expression: water_level > 63.40
    priority: MEDIUM
  - hydro_event_type: TIME_SERIES_DATA_UPDATED
    hydro_event_id: TS_DEFAULT_DEVICE_FAULT_001
    hydro_event_name: '尾边界节点出流为0,模拟泵站故障'
    auto_schedule_at_step: 10
    hydro_event_source_type: DEVICE_FAULT
    hydro_event_description: 模拟设备故障
    object_time_series:
      - time_series_name: 下流边界-水位时间序列
        object_id: 1064
        object_type: CrossSection
        object_name: QD-14#断面#002
        metrics_code: water_flow
        time_series:
          - step: 120
            value: 0
          - step: 240
            value: 0
          - step: 360
            value: 0
          - step: 480
            value: 0
          - step: 600
            value: 0
          - step: 720
            value: 0
          - step: 840
            value: 0
          - step: 960
            value: 0
          - step: 1080
            value: 0
          - step: 1200
            value: 0
          - step: 1320
            value: 0
          - step: 1440
            value: 0
          - step: 1560
            value: 0
    priority: HIGH
    valid: true
    auto_hydro_event_enable: true
    hydro_environment_type: NORMAL
  - hydro_event_type: HYDRO_MONITOR_RULE
    hydro_event_id: template-AutoMonitorRuleEvent-002
    hydro_event_name: 自动预警规则下发事件
    hydro_event_source_type: HYDRO_MONITOR_RULE
    hydro_event_description: 自动预警规则下发事件
    auto_schedule_at_step: 1
    auto_hydro_event_enable: true
    monitoring_rule:
      rule_id: MRULE_202603302210_5WZBL1QD
      rule_name: 自动下发的水位监控规则
      biz_status: NORMAL
      trigger_conditions:
        object_id: 1064
        object_name: QD-14#断面#002
        trigger_expression: water_level <= 0
    priority: MEDIUM
  - hydro_event_type: WEATHER_FORECAST
    hydro_event_id: template-WeatherForecastHydroEvent-001
    hydro_event_name: 天气预报事件
    auto_schedule_at_step: 10
    hydro_event_source_type: WEATHER_FOR_CAST
    hydro_event_description: 系统预制的暴雨事件
    time_series_url: http://47.97.1.45:9000/hydros/mdm/京石段/events/time_series_weather_forecast.json
    direct_load_time_series: true
    auto_hydro_event_enable: true
    priority: MEDIUM
auto_schedule_event_enabled: true
